pactoVersion: "1.0"

service:
  name: api
  version: 1.0.0
  owner: team/platform
  image:
    ref: ghcr.io/trianalab/pacto-demo/api:1.0.0

interfaces:
  - name: http
    type: http
    port: 8080
    visibility: public
    contract: interfaces/openapi.json

configuration:
  schema: configuration/schema.json

dependencies:
  - ref: oci://ghcr.io/trianalab/pacto-demo/inference
    required: true
    compatibility: "^1.0.0"

runtime:
  workload: service
  state:
    type: stateless
    persistence:
      scope: local
      durability: ephemeral
    dataCriticality: low
  lifecycle:
    upgradeStrategy: rolling
    gracefulShutdownSeconds: 10
  health:
    interface: http
    path: /health

scaling:
  min: 2
  max: 10

metadata:
  tier: gateway
  team: platform
