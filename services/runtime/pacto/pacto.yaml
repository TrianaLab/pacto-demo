pactoVersion: "1.0"

service:
  name: runtime
  version: 1.0.0
  owner: team/platform
  image:
    ref: ghcr.io/trianalab/pacto-demo/runtime:1.0.0

interfaces:
  - name: http
    type: http
    port: 8081
    visibility: internal
    contract: interfaces/openapi.json

configuration:
  schema: config.schema.json

runtime:
  workload: service
  state:
    type: stateless
    persistence:
      scope: local
      durability: ephemeral
    dataCriticality: low
  lifecycle:
    upgradeStrategy: rolling
    gracefulShutdownSeconds: 15
  health:
    interface: http
    path: /health

scaling:
  min: 1
  max: 5

metadata:
  tier: compute
  team: platform
