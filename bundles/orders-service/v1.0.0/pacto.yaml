pactoVersion: "1.0"

service:
  name: orders-service
  version: 1.0.0
  owner: team/commerce
  image:
    ref: ghcr.io/trianalab/pacto-demo/orders-service:1.0.0
  chart:
    ref: oci://ghcr.io/trianalab/charts/orders-service:1.0.0

interfaces:
  - name: http
    type: http
    port: 8082
    visibility: internal
    contract: interfaces/openapi.json
  - name: events
    type: event
    visibility: internal
    contract: interfaces/events.json

configuration:
  ref: oci://ghcr.io/trianalab/pacto-demo/platform-app-config
  values:
    OTEL_SERVICE_NAME: orders-service
    DATABASE_URL: postgresql://postgres:5432/orders
    PAYMENTS_SERVICE_URL: http://payments-service:8083

policy:
  ref: oci://ghcr.io/trianalab/pacto-demo/platform-http-policy

dependencies:
  - ref: oci://ghcr.io/trianalab/pacto-demo/postgresql
    required: true
    compatibility: "^16.0.0"
  - ref: oci://ghcr.io/trianalab/pacto-demo/payments-service
    required: true
    compatibility: "^1.0.0"
  - ref: oci://ghcr.io/trianalab/pacto-demo/notification-worker
    required: false
    compatibility: "^1.0.0"

runtime:
  workload: service
  state:
    type: stateful
    persistence:
      scope: shared
      durability: persistent
    dataCriticality: high
  lifecycle:
    upgradeStrategy: rolling
    gracefulShutdownSeconds: 30
  health:
    interface: http
    path: /health

scaling:
  min: 2
  max: 5

metadata:
  tier: domain
  category: orders
  criticality: high
  summary: Order management service handling order lifecycle and fulfillment
  language: go
  repo: github.com/trianalab/pacto-demo/orders-service
  tags:
    - orders
    - commerce
    - fulfillment
    - events
