name: "Demo: Contract Documentation"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation:
    name: Generate Contract Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      - name: Generate documentation for all contracts
        run: |
          SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
          MULTI="api-gateway orders-service payments-service"

          for svc in $SINGLE; do
            echo "Generating docs for $svc..."
            pacto doc "bundles/$svc" --add-to-summary || true
          done

          for svc in $MULTI; do
            for ver in bundles/$svc/v*/; do
              echo "Generating docs for $svc/$(basename $ver)..."
              pacto doc "$ver" --add-to-summary || true
            done
          done
