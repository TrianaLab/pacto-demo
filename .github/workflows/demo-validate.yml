name: "Demo: Validate & Explain"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-explain:
    name: Validate & Explain All Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      - name: Validate all contracts
        run: |
          SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
          MULTI="api-gateway orders-service payments-service"

          for svc in $SINGLE; do
            pacto validate "bundles/$svc"
          done

          for svc in $MULTI; do
            for ver in bundles/$svc/v*/; do
              pacto validate "$ver"
            done
          done

      - name: Explain all contracts
        run: |
          {
            echo "## Contract Summaries"
            echo ""
            SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
            MULTI="api-gateway orders-service payments-service"

            for svc in $SINGLE; do
              echo "### ${svc}"
              echo '```'
              pacto explain "bundles/$svc"
              echo '```'
              echo ""
            done

            for svc in $MULTI; do
              for ver in bundles/$svc/v*/; do
                echo "### ${svc}/$(basename $ver)"
                echo '```'
                pacto explain "$ver"
                echo '```'
                echo ""
              done
            done
          } >> "${GITHUB_STEP_SUMMARY}"
