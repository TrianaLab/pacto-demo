name: "Demo: Breaking Change Detection"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  breaking-change:
    name: Detect Breaking Changes (payments-service v1.2.0 vs v2.0.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      - name: Detect breaking changes
        id: diff
        uses: trianalab/pacto-actions@v1
        with:
          command: diff
          old: bundles/payments-service/v1.2.0
          new: bundles/payments-service/v2.0.0
          output-format: markdown
          fail-on-breaking: "false"

      - name: Write summary
        env:
          HAS_BREAKING: ${{ steps.diff.outputs.has-breaking-changes }}
        run: |
          {
            echo "## Breaking Change Detection Demo"
            echo ""
            echo "This workflow compares \`payments-service\` v1.2.0 against v2.0.0"
            echo "to demonstrate how Pacto detects breaking changes across:"
            echo ""
            echo "- **API**: \`/charges\` removed, \`/payment-intents\` introduced"
            echo "- **Config**: \`STRIPE_API_KEY\` renamed to \`STRIPE_SECRET_KEY\`, \`WEBHOOK_SECRET\` now required"
            echo "- **Dependencies**: \`fraud-service\` changed from optional to required"
            echo "- **Runtime**: upgrade strategy changed from rolling to recreate"
            echo "- **Events**: \`payment.completed\`/\`payment.failed\` replaced by \`payment.intent.*\`"
            echo ""
            if [ "${HAS_BREAKING}" = "true" ]; then
              echo "**Result: Breaking changes detected.**"
            else
              echo "**Result: No breaking changes.**"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
