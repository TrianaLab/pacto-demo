name: "Demo: Breaking Change Detection"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  breaking-change:
    name: Detect Breaking Changes (with overrides)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      # Diff the published OCI artifact against the local contract with overrides
      - name: Detect breaking changes
        id: diff
        uses: trianalab/pacto-actions@v1
        with:
          command: diff
          old: oci://ghcr.io/trianalab/pacto-demo/runtime
          new: services/runtime/pacto
          new-set: |
            service.version=2.0.0
            service.image.ref=ghcr.io/trianalab/pacto-demo/runtime:2.0.0
            interfaces[0].port=9090
          output-format: markdown
          fail-on-breaking: "false"

      - name: Write summary
        env:
          HAS_BREAKING: ${{ steps.diff.outputs.has-breaking-changes }}
        run: |
          {
            echo "## Breaking Change Detection Demo"
            echo ""
            echo "This workflow uses \`--new-set\` overrides to simulate breaking changes"
            echo "on the \`runtime\` contract and diffs the result against the published"
            echo "OCI artifact at \`oci://ghcr.io/trianalab/pacto-demo/runtime\`."
            echo ""
            echo "**Changes simulated via overrides:**"
            echo "1. Bumped version from 1.0.0 to 2.0.0 (\`--new-set service.version=2.0.0\`)"
            echo "2. Updated image tag (\`--new-set service.image.ref=....:2.0.0\`)"
            echo "3. Changed HTTP port from 8081 to 9090 (\`--new-set interfaces[0].port=9090\`)"
            echo ""
            if [ "${HAS_BREAKING}" = "true" ]; then
              echo "**Result: Breaking changes detected.**"
            else
              echo "**Result: No breaking changes.**"
            fi
            echo ""
            echo "No files were copied or modified — overrides are applied at diff time."
          } >> "${GITHUB_STEP_SUMMARY}"
