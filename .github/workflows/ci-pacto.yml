name: Pacto CI

on:
  pull_request:
    paths:
      - "bundles/**"
  push:
    branches: [main]
    paths:
      - "bundles/**"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  pacto:
    name: Pacto CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      # ── Validate all bundles ─────────────────────────
      - name: Validate all contracts
        run: |
          SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
          MULTI="api-gateway orders-service payments-service"

          for svc in $SINGLE; do
            echo "Validating $svc..."
            pacto validate "bundles/$svc"
          done

          for svc in $MULTI; do
            for ver in bundles/$svc/v*/; do
              echo "Validating $svc/$(basename $ver)..."
              pacto validate "$ver"
            done
          done

      # ── Diff (PRs only) ─────────────────────────────
      - name: Diff contracts against OCI registry
        if: github.event_name == 'pull_request'
        run: |
          REGISTRY="ghcr.io/trianalab/pacto-demo"
          SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"

          for svc in $SINGLE; do
            echo "Diffing $svc..."
            pacto diff "oci://$REGISTRY/$svc" "bundles/$svc" --output-format markdown || true
          done

      # ── Documentation ───────────────────────────────
      - name: Generate documentation
        run: |
          SINGLE="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
          MULTI="api-gateway orders-service payments-service"

          for svc in $SINGLE; do
            pacto doc "bundles/$svc" --add-to-summary || true
          done

          for svc in $MULTI; do
            for ver in bundles/$svc/v*/; do
              pacto doc "$ver" --add-to-summary || true
            done
          done

      # ── Push (main only, leaves first, root last) ───
      - name: Push contracts to OCI registry
        if: github.event_name == 'push'
        env:
          PACTO_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OCI_REGISTRY="ghcr.io/trianalab/pacto-demo"

          pacto login ghcr.io -u ${{ github.actor }} -p "$PACTO_REGISTRY_TOKEN"

          # Push single-version bundles (leaves first)
          PUSH_ORDER="platform-http-policy platform-app-config platform-worker-config postgresql redis stripe-api email-provider auth-service fraud-service notification-worker frontend pacto-demo"
          for svc in $PUSH_ORDER; do
            echo "Pushing $svc..."
            pacto push "oci://$OCI_REGISTRY/$svc" -p "bundles/$svc"
          done

          # Push multi-version bundles
          for svc in api-gateway orders-service payments-service; do
            for ver in bundles/$svc/v*/; do
              v=$(basename "$ver" | sed 's/^v//')
              echo "Pushing $svc:$v..."
              pacto push "oci://$OCI_REGISTRY/$svc:$v" -p "$ver"
            done
          done
