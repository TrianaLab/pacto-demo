name: "Demo: Dependency Graph"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  dependency-graph:
    name: Resolve Dependency Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: trianalab/pacto-actions@v1
        with:
          command: setup

      - name: Generate full dependency graph
        run: |
          {
            echo "## Full Platform Dependency Graph"
            echo ""
            echo "Resolved recursively from the \`pacto-demo\` root entry point:"
            echo ""
            echo '```'
            pacto graph oci://ghcr.io/trianalab/pacto-demo/pacto-demo
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
